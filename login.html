<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0a0d12">
  <title>Acceso · Juliette Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css"><link rel="stylesheet" href="assets/css/control.css">
</head>
<body class="simple-page">
  <main class="login-card compact-card">
    <a class="brand simple-brand" href="index.html"><span class="brand-mark">J</span><span><strong>Juliette</strong><small>Control Center</small></span></a>
    <h1>Iniciar sesión</h1>
    <p>Acceso autorizado para encender Juliette.</p>
    <form id="loginForm">
      <label for="staffName">Nombre</label>
      <input id="staffName" name="staff" maxlength="40" autocomplete="name" required>
      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <p class="login-error" id="loginError" role="alert" hidden></p>
      <button class="button button-primary button-wide" id="loginButton" type="submit">Iniciar sesión</button>
    </form>
  </main>
  <script type="module" src="assets/js/login.js"></script>
</body>
</html>
